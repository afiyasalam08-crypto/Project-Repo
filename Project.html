<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Journey</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Tahoma, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            text-align:center;
            color:white;

            background: linear-gradient(
                135deg,
                #0f2027,
                #203a43,
                #2c5364
            );

            overflow:hidden;
        }

        h1{
            font-size:60px;
            letter-spacing:3px;
            margin-bottom:20px;

            animation: glow 2s infinite alternate;
        }

        @keyframes glow{
            from{
                text-shadow:0 0 10px #00f2fe;
            }

            to{
                text-shadow:0 0 25px #4facfe;
            }
        }

        p{
            font-size:18px;
            width:70%;
            line-height:1.8;
            opacity:0.9;
            margin-bottom:15px;
        }

        .first{
            font-size:20px;
            color:#00f2fe;
            letter-spacing:1px;
        }

        .circle1{
            position:absolute;
            width:250px;
            height:250px;
            background:#00f2fe;
            border-radius:50%;
            top:-80px;
            left:-80px;
            opacity:0.2;
        }

        .circle2{
            position:absolute;
            width:300px;
            height:300px;
            background:#4facfe;
            border-radius:50%;
            bottom:-100px;
            right:-100px;
            opacity:0.2;
        }

    </style>
</head>

<body>

    <div class="circle1"></div>
    <div class="circle2"></div>

    <h1>✦ SKY JOURNEY ✦</h1>

    <p>
        Discover new paths, feel new energies,
        and explore the beauty hidden beyond the horizon.
    </p>

    <p class="first">
        This is Afiya's first web page project ✨
    </p>

</body>
</html>
